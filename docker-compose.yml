name: mindmate-stack

services:
  mindmate:
    image: ${IMAGE:?IMAGE must be provided}
    container_name: mindmate
    env_file:
      - .env.vm
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
