name: Send POST to /api/notifications/comprehensive-check

on:
  workflow_dispatch:
  
jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Send POST request
        run: |
          curl -X POST "https://mindmate.hamidijaz.dev/api/notifications/comprehensive-check" \
            -H "Authorization: Bearer ${{ secrets.CRON_AUTH_TOKEN }}"
